name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test
      - name: Build
        env:
          DATABASE_URL: libsql://ci-placeholder.local
          DATABASE_AUTH_TOKEN: ci
          NEXTAUTH_SECRET: ci-build-secret-at-least-32-chars!!
        run: pnpm run build
